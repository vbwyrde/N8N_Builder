<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N8N Workflow Builder</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .workflow-result {
            white-space: pre-wrap;
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.25rem;
            margin-top: 1rem;
        }
        .loading {
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">N8N Workflow Builder</h1>
        
        <div class="card">
            <div class="card-body">
                <form id="workflowForm">
                    <div class="mb-3">
                        <label for="description" class="form-label">Workflow Description</label>
                        <textarea class="form-control" id="description" rows="3" 
                                placeholder="Describe the workflow you want to create..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Generate Workflow</button>
                </form>
            </div>
        </div>

        <div class="loading">
            <div class="d-flex align-items-center">
                <div class="spinner-border text-primary me-2" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span>Generating workflow...</span>
            </div>
        </div>

        <div id="result" class="workflow-result" style="display: none;">
            <h3>Generated Workflow:</h3>
            <pre id="workflowJson"></pre>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('workflowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const description = document.getElementById('description').value;
            const loading = document.querySelector('.loading');
            const result = document.getElementById('result');
            const workflowJson = document.getElementById('workflowJson');
            
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ description }),
                });
                
                const reader = response.body.getReader();
                let workflowData = null;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const text = new TextDecoder().decode(value);
                    const events = text.split('\n').filter(Boolean);
                    
                    for (const event of events) {
                        const data = JSON.parse(event);
                        if (data.type === 'WORKFLOW_GENERATED') {
                            workflowData = data.data;
                        }
                    }
                }
                
                if (workflowData) {
                    // Parse the workflow_json string as JSON if possible
                    let parsedJson;
                    try {
                        parsedJson = JSON.parse(workflowData.workflow_json);
                    } catch (e) {
                        parsedJson = workflowData.workflow_json;
                    }
                    workflowJson.textContent = JSON.stringify(parsedJson, null, 2);
                    result.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error generating workflow. Please try again.');
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
